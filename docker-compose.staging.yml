services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-optica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-optica123}
      POSTGRES_DB: ${POSTGRES_DB:-optica_db}
    volumes:
      - optica_staging_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-optica} -d ${POSTGRES_DB:-optica_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/${GHCR_OWNER:-zhulgon}/optica-api:staging
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-optica}:${POSTGRES_PASSWORD:-optica123}@db:5432/${POSTGRES_DB:-optica_db}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS:-7}
      REDIS_URL: redis://redis:6379
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://localhost:3000/health >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    image: ghcr.io/${GHCR_OWNER:-zhulgon}/optica-web:staging
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://localhost/ >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  optica_staging_pgdata:
