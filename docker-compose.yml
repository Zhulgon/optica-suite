services:
  db:
    image: postgres:16
    container_name: optica_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: optica
      POSTGRES_PASSWORD: optica123
      POSTGRES_DB: optica_db
    ports:
      - "5432:5432"
    volumes:
      - optica_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-optica} -d ${POSTGRES_DB:-optica_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  optica_pgdata:
